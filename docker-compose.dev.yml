services:
  db:
    image: mariadb:11.4
    container_name: zentime-mariadb-dev
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  dbgate:
    image: dbgate/dbgate
    container_name: zentime-dbgate
    restart: always
    ports:
      - '8080:3000'
    depends_on:
      - db

  app:
    image: node:20-alpine
    container_name: zentime-nextjs-dev
    working_dir: /app
    command: sh -c "npm install && npx prisma generate && npm run dev"
    ports:
      - '3000:3000'
      - '5555:5555'
    env_file:
      - .env
    volumes:
      - ./:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - db

volumes:
  db_data:
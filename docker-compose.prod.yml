services:
  db:
    image: mariadb:11.4
    container_name: zentime-mariadb-prod
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data_prod:/var/lib/mysql

  app:
    image: zineddinebe/zentime-app:v0.2.0
    container_name: zentime-nextjs-prod
    restart: always
    env_file:
      - .env.prod
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: zentime-nginx
    restart: always
    ports:
      - "80:80"
    command: >
      sh -c "printf 'server {
          listen 80;
          location / {
              proxy_pass http://app:3000;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
          }
      }' > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    depends_on:
      - app

volumes:
  db_data_prod: